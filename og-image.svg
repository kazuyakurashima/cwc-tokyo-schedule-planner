<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#000000" flood-opacity="0.08"/>
    </filter>
    <style>
      text{font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue','Hiragino Sans','Noto Sans JP',Arial,sans-serif;}
    </style>
  </defs>

  <!-- canvas -->
  <rect width="1200" height="630" fill="#F7F6F3"/>
  <!-- card -->
  <rect x="32" y="32" width="1136" height="566" rx="36" fill="#FFFFFF" stroke="#E6E3DA" stroke-width="1.5" filter="url(#cardShadow)"/>

  <!-- left column -->
  <text x="88" y="100" fill="#9A9890" font-size="22" font-weight="700" letter-spacing="4.5">UNOFFICIAL SESSION PLANNER</text>

  <text x="86" y="180" fill="#181816" font-size="66" font-weight="800" letter-spacing="-1">Code with Claude</text>
  <text x="86" y="250" fill="#181816" font-size="66" font-weight="800" letter-spacing="-1">Tokyo 2026</text>

  <text x="88" y="312" fill="#5A5955" font-size="27" font-weight="500">Compare 3 parallel tracks, check your sessions,</text>
  <text x="88" y="350" fill="#5A5955" font-size="27" font-weight="500">and save your plan in your browser.</text>

  <!-- day pills -->
  <g transform="translate(88 446)">
    <rect width="142" height="50" rx="13" fill="#181816"/>
    <text x="26" y="32" fill="#FFFFFF" font-size="22" font-weight="700">Day 1 · 6/10</text>
    <rect x="158" width="142" height="50" rx="13" fill="#EFEDE7" stroke="#D9D6CC" stroke-width="1.5"/>
    <text x="184" y="32" fill="#5A5955" font-size="22" font-weight="700">Day 2 · 6/11</text>
  </g>

  <!-- legend -->
  <g transform="translate(88 547)">
    <circle cx="9" cy="9" r="9" fill="#1D9E75"/>
    <text x="30" y="17" fill="#5A5955" font-size="22" font-weight="600">Research</text>
    <circle cx="170" cy="9" r="9" fill="#7F77DD"/>
    <text x="191" y="17" fill="#5A5955" font-size="22" font-weight="600">Platform</text>
    <circle cx="328" cy="9" r="9" fill="#D85A30"/>
    <text x="349" y="17" fill="#5A5955" font-size="22" font-weight="600">Claude Code</text>
  </g>

  <!-- right column: session rows -->
  <g transform="translate(686 209)">
    <!-- checked (teal) -->
    <rect width="428" height="62" rx="16" fill="#E1F5EE" stroke="#1D9E75" stroke-width="3"/>
    <text x="26" y="39" fill="#085041" font-size="20" font-weight="700">10:30 · What's new in Claude Code</text>
    <circle cx="398" cy="31" r="15" fill="#1D9E75"/>
    <path d="M390.5 31l5.5 5.5 11-14" fill="none" stroke="#FFFFFF" stroke-width="3.6" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- unchecked (purple) -->
    <rect y="78" width="428" height="62" rx="16" fill="#EEEDFE" stroke="#7F77DD" stroke-width="3"/>
    <text x="26" y="117" fill="#3C3489" font-size="20" font-weight="700">11:15 · Inside Canva AI</text>
    <circle cx="398" cy="109" r="14" fill="none" stroke="#B9B4EC" stroke-width="2.5"/>

    <!-- unchecked (coral) -->
    <rect y="156" width="428" height="62" rx="16" fill="#FAECE7" stroke="#D85A30" stroke-width="3"/>
    <text x="26" y="195" fill="#712B13" font-size="20" font-weight="700">14:00 · Tool, skill, or subagent?</text>
    <circle cx="398" cy="187" r="14" fill="none" stroke="#E6B6A2" stroke-width="2.5"/>
  </g>
</svg>
